name: Verify API samples

# Phase 1 acceptance step: this runner has real internet access (unlike the
# sandbox the data layer was developed in), so it can actually reach
# twse.com.tw / tpex.org.tw / mops.twse.com.tw. Manually triggered — this is
# a one-off verification run, not part of the daily schedule.
#
# This workflow file lives on main (workflow_dispatch only shows up in the
# Actions UI for workflows present on the default branch), but the actual
# Phase 1 code — scripts/verify_api_samples.py, the fetchers, etc. — only
# exists on the feature branch below. So this always checks out and commits
# back to that branch, regardless of which branch/main triggered the run.

on:
  workflow_dispatch:

env:
  TARGET_BRANCH: claude/taiwan-stock-screening-phase1-3eng2j

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements-stock-screener.txt

      - name: Run verify_api_samples.py
        run: python scripts/verify_api_samples.py

      - name: Commit samples if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/api_samples/
          if git diff --cached --quiet; then
            echo "No changes to docs/api_samples/, nothing to commit."
          else
            git commit -m "Update API samples from verify_api_samples.py run"
            git push origin HEAD:${{ env.TARGET_BRANCH }}
          fi
