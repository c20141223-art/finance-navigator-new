# 資料源設定 — 台股選股工具 Phase 1
#
# 驗證狀態（兩輪 GitHub Actions 真實請求，2026-07-11/12，完整記錄見
# docs/api_samples/README.md）：
#
#   已用真實樣本確認（含資料列）：
#     twse_daily_all, twse_daily_history, twse_institutional,
#     twse_ex_rights, twse_disposition, tpex_daily_all,
#     tpex_daily_history, isin_listed, isin_otc
#   端點路徑取自官方 swagger 目錄、尚未抓到真實樣本（第三輪確認）：
#     tpex_institutional（/tpex_3insti_daily_trading）
#     tpex_disposition（/tpex_disposal_information）
#     monthly_revenue_sii / monthly_revenue_otc（原 MOPS 靜態檔已 404，
#       改用兩交易所 openapi 的月營收彙總表）
#
# Headers 策略：沿用 stock-report 專案已驗證數月的格式（瀏覽器型 UA +
# 指向來源網站的 Referer），定義於各 fetchers 模組。

http:
  timeout_seconds: 20
  # 同一 host 兩次請求間至少間隔幾秒（笨但穩的 rate limit 保護）
  min_interval_seconds: 1.5
  max_retries: 3
  retry_backoff_seconds: 3

data:
  # 初始化回補至少 90 個交易日歷史（供 60MA / 回檔幅度計算）
  min_backfill_trading_days: 90
  # daily_price 連續抓不到資料達此天數，標記 stock_meta.is_active = 0
  inactive_after_missing_days: 5

sources:
  # 上市（TWSE）全市場「最新一個交易日」收盤行情，整批 JSON，不支援指定日期
  # → 每日增量更新用這支即可（17:30 觸發時當天資料已是最新）
  twse_daily_all: "https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY_ALL"

  # 上市全市場「指定日期」收盤行情（回補歷史用，需逐日呼叫）
  # date 參數格式 YYYYMMDD（西元）。回應為 tables 包裝格式。
  twse_daily_history: "https://www.twse.com.tw/exchangeReport/MI_INDEX?date={date}&type=ALLBUT0999&response=json"

  # 上櫃（TPEx）全市場日收盤行情，整批 JSON（僅最新日）
  tpex_daily_all: "https://www.tpex.org.tw/openapi/v1/tpex_mainboard_daily_close_quotes"

  # 上櫃全市場「指定日期」收盤行情（回補歷史用）。d 參數為民國年/月/日
  tpex_daily_history: "https://www.tpex.org.tw/web/stock/aftertrading/otc_quotes_no1430/stk_wn1430_result.php?l=zh-tw&d={roc_date}&se=EW"

  # 上市三大法人買賣超日報（T86，整批，date 為西元 YYYYMMDD）
  twse_institutional: "https://www.twse.com.tw/rwd/zh/fund/T86?date={date}&selectType=ALL&response=json"

  # 上櫃三大法人買賣明細（openapi，僅最新日；路徑取自官方 swagger）
  tpex_institutional: "https://www.tpex.org.tw/openapi/v1/tpex_3insti_daily_trading"

  # 月營收彙總表：原 MOPS 靜態檔（mops.twse.com.tw/nas/t21/...）已 404，
  # 改用兩交易所 openapi 的同一份報表（回傳最新可得月份，資料月份以
  # 回應內的 資料年月 欄位為準）
  monthly_revenue_sii: "https://openapi.twse.com.tw/v1/opendata/t187ap05_L"
  monthly_revenue_otc: "https://www.tpex.org.tw/openapi/v1/mopsfin_t187ap05_O"

  # 上市處置股公告（回應每列含 處置起迄時間 區間）
  twse_disposition: "https://www.twse.com.tw/rwd/zh/announcement/punish"

  # 上櫃處置股（openapi JSON；舊 print-view 頁已 404，新頁面由 JS 渲染
  # 無法直接解析。路徑取自官方 swagger）
  tpex_disposition: "https://www.tpex.org.tw/openapi/v1/tpex_disposal_information"

  # 全市場證券基本資料（含上市/上櫃別、產業別），ISIN 公告網站
  # strMode=2 上市, strMode=4 上櫃。現為 UTF-8 編碼（舊 Big5 已停用）。
  isin_listed: "https://isin.twse.com.tw/isin/C_public.jsp?strMode=2"
  isin_otc: "https://isin.twse.com.tw/isin/C_public.jsp?strMode=4"

  # 除權除息預告（TWT49U，回傳未來一段區間的預告，每列含自己的 資料日期）
  twse_ex_rights: "https://www.twse.com.tw/rwd/zh/exRight/TWT49U?response=json"
